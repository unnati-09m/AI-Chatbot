<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Workspace - Minimalist Chat and Image Generation">
    <title>AI Workspace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-info">
                <h1><span>AI</span> Workspace</h1>
                <p>System v2.5.0 • Powered by Qwen & Flux</p>
            </div>
            <div class="header-actions">
                <button id="clear-btn" class="action-btn secondary-btn" title="Clear Memory">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/>
                    </svg>
                </button>
                <div class="status-dot" title="Systems Online"></div>
            </div>
        </header>

        <div class="chat-history" id="chat-history">
            <!-- Messages will be appended here -->
            <div class="message bot-message">
                <div class="message-label">Assistant</div>
                <div class="message-content">
                    Systems initialized. How can I assist your workflow today?
                </div>
            </div>
        </div>

        <div class="typing-indicator" id="typing-indicator" style="display: none;">
            <span></span><span></span><span></span>
        </div>

        <div class="chat-input-wrapper">
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Message or prompt..." autocomplete="off">
                
                <button id="generate-image-btn" class="action-btn secondary-btn" title="Generate Image">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                    </svg>
                </button>

                <button id="send-btn" class="action-btn primary-btn" title="Send Message">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
